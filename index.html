<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RURALJDM — DAILY BRIEFING</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #ffb000;
    --amber-dim: #7a5200;
    --amber-dark: #1a0e00;
    --amber-mid: #cc8800;
    --amber-bright: #ffd060;
    --bg: #080500;
    --surface: #0d0800;
    --surface2: #120b00;
    --border: #3a2200;
    --glow: 0 0 10px #ffb000, 0 0 30px rgba(255,176,0,0.25);
    --glow-sm: 0 0 5px #ffb000, 0 0 12px rgba(255,176,0,0.2);
    --red: #ff3300;
    --red-dim: #4a1000;
    --green: #44ff44;
    --blue: #00cfff;
    --purple: #cc44ff;
    --orange: #ff8800;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--amber); font-family:'Share Tech Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 4px); pointer-events:none; z-index:1000; }
  body::after { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background:radial-gradient(ellipse at 50% 30%,transparent 40%,rgba(0,0,0,0.88) 100%); pointer-events:none; z-index:999; }
  @keyframes flicker { 0%,92%,100%{opacity:1}93%{opacity:0.9}94%{opacity:1}98%{opacity:0.95} }
  @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  @keyframes scanDown { 0%{top:-5%}100%{top:105%} }
  @keyframes bootBar { from{width:0}to{width:100%} }
  @keyframes bootFade { 0%,85%{opacity:1}100%{opacity:0} }
  @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .scan-line { position:fixed;left:0;right:0;height:2px;background:linear-gradient(transparent,rgba(255,176,0,0.05),transparent);animation:scanDown 8s linear infinite;pointer-events:none;z-index:998; }

  #boot-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:5000;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:28px;animation:bootFade 0.4s ease 2.8s forwards; }
  .boot-logo { font-family:'VT323',monospace;font-size:52px;color:var(--amber);text-shadow:var(--glow);letter-spacing:4px;line-height:1; }
  .boot-sub { font-size:10px;color:var(--amber-dim);letter-spacing:3px;margin-bottom:20px;margin-top:4px; }
  .boot-line { font-size:11px;color:var(--amber-dim);letter-spacing:1px;margin-bottom:5px;opacity:0; }
  .boot-line.show { opacity:1; }
  .boot-line .ok { color:var(--amber); }
  .boot-bar-track { height:4px;background:var(--amber-dark);border:1px solid var(--border);margin-top:16px; }
  .boot-bar-fill { height:100%;background:var(--amber);box-shadow:var(--glow-sm);width:0;animation:bootBar 1.8s ease 0.3s forwards; }
  #app { animation:fadeIn 0.4s ease 3.2s both; }
  .terminal { animation:flicker 10s infinite;max-width:560px;margin:0 auto;padding:12px;padding-bottom:80px; }

  .brief-header { border:2px solid var(--amber);box-shadow:var(--glow);padding:16px 18px;margin-bottom:12px;background:var(--surface);position:relative; }
  .brief-header::before { content:'VAULT-TEC OPERATIVE DAILY BRIEFING // MURCHISON OUTPOST VIC-075'; position:absolute;top:-9px;left:14px;background:var(--bg);padding:0 6px;font-size:8px;color:var(--amber-dim);letter-spacing:1px; }
  .brief-date { font-family:'VT323',monospace;font-size:32px;color:var(--amber);text-shadow:var(--glow);letter-spacing:2px;line-height:1; }
  .brief-time { font-family:'VT323',monospace;font-size:52px;color:var(--amber-bright);text-shadow:var(--glow);letter-spacing:3px;line-height:1;margin-top:2px; }
  .brief-operative { font-size:9px;color:var(--amber-dim);letter-spacing:3px;margin-top:4px; }
  .cursor { display:inline-block;width:7px;height:12px;background:var(--amber);animation:blink 1s infinite;vertical-align:middle;margin-left:3px; }

  .greeting-box { border:1px solid var(--amber-dim);padding:11px 14px;margin-bottom:10px;background:var(--bg); }
  .greeting-text { font-size:12px;color:var(--amber-bright);letter-spacing:0.5px;line-height:1.6; }

  .refresh-btn { width:100%;background:transparent;border:1px solid var(--border);color:var(--amber-dim);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:9px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;margin-bottom:10px; }
  .refresh-btn:hover { border-color:var(--amber);color:var(--amber); }

  .brief-section { border:1px solid var(--border);background:var(--surface);margin-bottom:10px;overflow:hidden; }
  .brief-section-header { display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);cursor:pointer;user-select:none; }
  .brief-section-title { font-size:10px;letter-spacing:2px;text-transform:uppercase; }
  .brief-section-count { font-family:'VT323',monospace;font-size:20px; }
  .brief-section-body { padding:12px;display:none; }
  .brief-section.expanded .brief-section-body { display:block;animation:fadeIn 0.2s ease; }

  .weather-wrap { display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center; }
  .weather-icon { font-size:48px;line-height:1; }
  .weather-temp { font-family:'VT323',monospace;font-size:52px;color:var(--amber);text-shadow:var(--glow-sm);line-height:1; }
  .weather-desc { font-size:10px;color:var(--amber-dim);letter-spacing:1px;margin-top:3px;text-transform:uppercase; }
  .weather-detail { font-size:10px;color:var(--amber-dim);letter-spacing:1px;margin-top:3px; }
  .loading-row { display:flex;align-items:center;gap:10px;font-size:11px;color:var(--amber-dim);letter-spacing:1px; }
  .spin { animation:spin 1s linear infinite;display:inline-block; }
  .weather-forecast { display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border); }
  .fc-day { text-align:center;border:1px solid var(--border);padding:6px 4px;background:var(--bg); }
  .fc-day-name { font-size:8px;color:var(--amber-dim);letter-spacing:1px; }
  .fc-icon { font-size:18px;margin:3px 0; }
  .fc-max { font-family:'VT323',monospace;font-size:18px;color:var(--amber); }
  .fc-min { font-size:8px;color:var(--amber-dim); }
  .triton-warn { border:1px solid var(--red);padding:8px 10px;margin-top:10px;font-size:10px;color:var(--red);letter-spacing:1px;animation:pulse 2s infinite; }

  .cal-event { padding:9px 0;border-bottom:1px solid var(--border); }
  .cal-event:last-child { border-bottom:none; }
  .cal-event-time { font-size:9px;color:var(--amber-dim);letter-spacing:1px;margin-bottom:2px; }
  .cal-event-title { font-size:12px;color:var(--amber-bright);letter-spacing:0.5px; }
  .cal-event.show-type { border-left:3px solid var(--amber);padding-left:8px; }
  .cal-event.personal-type { border-left:3px solid var(--blue);padding-left:8px; }

  .task-item { display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border); }
  .task-item:last-child { border-bottom:none; }
  .task-check { width:14px;height:14px;border:1px solid var(--amber-dim);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all 0.15s;margin-top:2px; }
  .task-check.done { background:var(--amber);color:var(--bg);border-color:var(--amber); }
  .task-body { flex:1; }
  .task-text { font-size:11px;color:var(--amber-bright);letter-spacing:0.5px;line-height:1.4; }
  .task-text.done { text-decoration:line-through;color:var(--amber-dim);opacity:0.6; }
  .task-pri { font-size:8px;letter-spacing:1px;padding:1px 5px;border:1px solid;margin-top:3px;display:inline-block; }
  .tp-high { border-color:var(--red);color:var(--red); }
  .tp-med { border-color:var(--amber);color:var(--amber); }
  .tp-low { border-color:var(--amber-dim);color:var(--amber-dim); }
  .task-del { background:none;border:none;color:var(--red-dim);font-size:12px;cursor:pointer;transition:color 0.15s;padding:0 4px;flex-shrink:0; }
  .task-del:hover { color:var(--red); }
  .add-task-row { display:flex;gap:6px;margin-top:8px;flex-wrap:wrap; }
  .task-input { flex:1;min-width:100px;background:var(--bg);border:1px solid var(--border);color:var(--amber);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 9px;letter-spacing:1px;outline:none;transition:border-color 0.15s; }
  .task-input:focus { border-color:var(--amber); }
  .task-input::placeholder { color:var(--amber-dim); }
  select.task-input { cursor:pointer; }
  .task-add-btn { background:transparent;border:1px solid var(--amber-dim);color:var(--amber-dim);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:7px 10px;cursor:pointer;transition:all 0.15s;text-transform:uppercase; }
  .task-add-btn:hover { border-color:var(--amber);color:var(--amber); }

  .show-item { padding:8px 0;border-bottom:1px solid var(--border); }
  .show-item:last-child { border-bottom:none; }
  .show-name { font-size:12px;color:var(--amber-bright);letter-spacing:0.5px; }
  .show-meta { font-size:9px;color:var(--amber-dim);letter-spacing:1px;margin-top:2px; }
  .show-countdown { font-family:'VT323',monospace;font-size:22px;color:var(--amber); }

  .empty-state { text-align:center;padding:14px;color:var(--amber-dim);font-size:10px;letter-spacing:2px;line-height:2; }
  .toast { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--amber);color:var(--bg);font-family:'VT323',monospace;font-size:18px;letter-spacing:3px;padding:9px 20px;z-index:4000;box-shadow:var(--glow);display:none;white-space:nowrap; }
  .toast.show { display:block; }
</style>
</head>
<body>
<div class="scan-line"></div>

<div id="boot-screen">
  <div class="boot-logo">RURALJDM</div>
  <div class="boot-sub">// VAULT-TEC OPERATIVE DAILY BRIEFING</div>
  <div id="boot-lines"></div>
  <div class="boot-bar-track"><div class="boot-bar-fill"></div></div>
</div>

<div id="app">
<div class="terminal">

  <div class="brief-header">
    <div class="brief-date" id="brief-date"></div>
    <div class="brief-time" id="brief-time"></div>
    <div class="brief-operative">// OPERATIVE: JOSH · MURCHISON BASE · VIC WASTELAND<span class="cursor"></span></div>
  </div>

  <div class="greeting-box">
    <div class="greeting-text" id="greeting-text">INITIALISING...</div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="loadLiveData()">⚙ REFRESH BRIEFING</button>

  <div class="brief-section expanded" id="section-weather">
    <div class="brief-section-header" onclick="toggleSection('weather')">
      <span class="brief-section-title" style="color:var(--blue);">🌤 ATMOSPHERIC CONDITIONS — MURCHISON</span>
      <span class="brief-section-count" style="color:var(--blue);" id="weather-header-temp">—°C</span>
    </div>
    <div class="brief-section-body" id="weather-body">
      <div class="loading-row"><span class="spin">⚙</span> Scanning atmosphere...</div>
    </div>
  </div>

  <div class="brief-section expanded" id="section-calendar">
    <div class="brief-section-header" onclick="toggleSection('calendar')">
      <span class="brief-section-title" style="color:var(--amber);">📅 TODAY'S DEPLOYMENTS</span>
      <span class="brief-section-count" id="cal-count">—</span>
    </div>
    <div class="brief-section-body" id="calendar-body">
      <div class="loading-row"><span class="spin">⚙</span> Syncing calendar...</div>
    </div>
  </div>

  <div class="brief-section expanded" id="section-tasks">
    <div class="brief-section-header" onclick="toggleSection('tasks')">
      <span class="brief-section-title" style="color:var(--orange);">⚡ ACTIVE TASKS</span>
      <span class="brief-section-count" style="color:var(--orange);" id="task-count">0</span>
    </div>
    <div class="brief-section-body">
      <div id="task-list"></div>
      <div class="add-task-row">
        <input type="text" class="task-input" id="new-task" placeholder="Add task..." autocomplete="off" onkeydown="if(event.key==='Enter')addTask()" />
        <select class="task-input" id="task-pri" style="max-width:80px;">
          <option value="high">HIGH</option>
          <option value="med" selected>MED</option>
          <option value="low">LOW</option>
        </select>
        <button class="task-add-btn" onclick="addTask()">+ ADD</button>
      </div>
    </div>
  </div>

  <div class="brief-section expanded" id="section-shows">
    <div class="brief-section-header" onclick="toggleSection('shows')">
      <span class="brief-section-title" style="color:var(--purple);">🚐 UPCOMING DEPLOYMENTS</span>
      <span class="brief-section-count" style="color:var(--purple);" id="shows-count">—</span>
    </div>
    <div class="brief-section-body" id="shows-body"></div>
  </div>

</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://ruraljdm-briefing.jtcelic01.workers.dev';
const KEY = 'ruraljdm_briefing_v3';

const SHOWS = [
  {name:'Yarra Glen Caravan Show',start:'2026-03-19',state:'VIC'},
  {name:'Ballarat Caravan Show',start:'2026-04-09',state:'VIC'},
  {name:'Sydney Caravan Show',start:'2026-04-27',state:'NSW'},
  {name:'Bendigo Caravan Show',start:'2026-05-29',state:'VIC'},
  {name:'Brisbane Major',start:'2026-06-03',state:'QLD'},
  {name:'Tamworth Caravan Show',start:'2026-06-25',state:'NSW'},
  {name:'Adelaide Caravan Show',start:'2026-07-22',state:'SA'},
  {name:'Scoresby Caravan Show',start:'2026-08-06',state:'VIC'},
  {name:'Shepparton Caravan Show',start:'2026-08-14',state:'VIC'},
  {name:'Sandown Caravan Show',start:'2026-09-16',state:'VIC'},
  {name:'Lardner Park Caravan Show',start:'2026-10-01',state:'VIC'},
  {name:'Traralgon Caravan Show',start:'2026-10-15',state:'VIC'},
  {name:'Adelaide 4x4',start:'2026-10-22',state:'SA'},
  {name:'Mount Barker',start:'2026-11-13',state:'SA'},
  {name:'Bendigo Caravan Show',start:'2026-11-20',state:'VIC'},
  {name:'Mildura Caravan Show',start:'2026-12-03',state:'VIC'},
];

let tasks = [];

// ── BOOT ───────────────────────────────────────────────────────────────────
const bootMsgs = [
  'INITIALISING OPERATIVE SYSTEMS..........<span class="ok">OK</span>',
  'LOCATING MURCHISON VIC-075...............<span class="ok">OK</span>',
  'CONNECTING TO WEATHER FEED...............<span class="ok">OK</span>',
  'CONNECTING TO CALENDAR FEED..............<span class="ok">OK</span>',
  'DAILY BRIEFING TERMINAL READY............<span class="ok">OK</span>',
];
let bi=0;
function runBoot(){
  if(bi<bootMsgs.length){
    const el=document.createElement('div');
    el.className='boot-line show';
    el.innerHTML=bootMsgs[bi];
    document.getElementById('boot-lines').appendChild(el);
    bi++;
    setTimeout(runBoot,360);
  }
}
setTimeout(runBoot,150);
setTimeout(()=>{
  document.getElementById('boot-screen').style.display='none';
  init();
},3200);

// ── INIT ───────────────────────────────────────────────────────────────────
function getData(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function saveData(){try{localStorage.setItem(KEY,JSON.stringify({tasks}));}catch(e){}}

function init(){
  const d=getData();
  tasks=d.tasks||[];
  startClock();
  renderGreeting();
  renderTasks();
  renderShows();
  loadLiveData();
}

// ── CLOCK ──────────────────────────────────────────────────────────────────
function startClock(){updateClock();setInterval(updateClock,1000);}
function updateClock(){
  const n=new Date();
  const days=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('brief-date').textContent=`${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('brief-time').innerHTML=`${h}:${m}:${s}<span class="cursor"></span>`;
}

// ── GREETING ───────────────────────────────────────────────────────────────
function renderGreeting(){
  const h=new Date().getHours();
  const g={
    morning:['Good morning operative. Coffee before the wasteland.','Morning. Murchison base still standing.','Early start. The Triton better cooperate today.'],
    afternoon:['Afternoon debrief. How are the deals going?','Midday check-in. HSP scouted yet?','Afternoon operative. Staying hydrated out there?'],
    evening:['Evening debrief. Time to wind down.','Good evening. New Vegas tonight?','End of day report. Barry fed and accounted for?'],
    night:['Late night operative. Again.','Still up? The wasteland will be here tomorrow.','Night shift. Classic Josh. 😄'],
  };
  const p=h<12?'morning':h<17?'afternoon':h<21?'evening':'night';
  const opts=g[p];
  document.getElementById('greeting-text').textContent=opts[Math.floor(Math.random()*opts.length)];
}

// ── LIVE DATA ──────────────────────────────────────────────────────────────
async function loadLiveData(){
  const btn=document.getElementById('refresh-btn');
  btn.textContent='⚙ SYNCING...';
  btn.disabled=true;
  await Promise.all([loadWeather(),loadCalendar()]);
  btn.textContent='⚙ REFRESH BRIEFING';
  btn.disabled=false;
}

// ── WEATHER (Open-Meteo — free, no key) ───────────────────────────────────
async function loadWeather(){
  const body=document.getElementById('weather-body');
  body.innerHTML=`<div class="loading-row"><span class="spin">⚙</span> Scanning atmosphere...</div>`;
  try{
    const lat=-36.6253,lon=145.2174;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Australia%2FSydney&forecast_days=6`;
    const res=await fetch(url);
    const d=await res.json();
    const c=d.current;
    const daily=d.daily;
    const temp=Math.round(c.temperature_2m);
    const feels=Math.round(c.apparent_temperature);
    const humidity=c.relative_humidity_2m;
    const wind=Math.round(c.wind_speed_10m);
    const {icon,desc}=wCode(c.weather_code);
    document.getElementById('weather-header-temp').textContent=`${temp}°C`;
    const forecast=daily.time.slice(1,6).map((t,i)=>{
      const day=['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(t).getDay()];
      const {icon:fi}=wCode(daily.weather_code[i+1]);
      return `<div class="fc-day"><div class="fc-day-name">${day}</div><div class="fc-icon">${fi}</div><div class="fc-max">${Math.round(daily.temperature_2m_max[i+1])}°</div><div class="fc-min">${Math.round(daily.temperature_2m_min[i+1])}°</div></div>`;
    }).join('');
    const triton=temp>=35?`<div class="triton-warn">⚠ ${temp}°C DETECTED — TRITON OVERHEAT RISK. MONITOR COOLANT GAUGE.</div>`:'';
    body.innerHTML=`
      <div class="weather-wrap">
        <div class="weather-icon">${icon}</div>
        <div>
          <div class="weather-temp">${temp}°C</div>
          <div class="weather-desc">${desc}</div>
          <div class="weather-detail">FEELS LIKE ${feels}°C · HUMIDITY ${humidity}%</div>
          <div class="weather-detail">WIND ${wind}KM/H · MURCHISON VIC</div>
        </div>
      </div>
      ${triton}
      <div class="weather-forecast">${forecast}</div>`;
  }catch(e){
    body.innerHTML=`<div style="font-size:10px;color:var(--amber-dim);letter-spacing:1px;">WEATHER UNAVAILABLE — CHECK CONNECTION</div>`;
  }
}

function wCode(code){
  if(code===0) return {icon:'☀️',desc:'CLEAR SKIES'};
  if(code<=2) return {icon:'⛅',desc:'PARTLY CLOUDY'};
  if(code===3) return {icon:'☁️',desc:'OVERCAST'};
  if(code<=49) return {icon:'🌫️',desc:'FOG / HAZE'};
  if(code<=59) return {icon:'🌦️',desc:'DRIZZLE'};
  if(code<=69) return {icon:'🌧️',desc:'RAIN'};
  if(code<=79) return {icon:'❄️',desc:'SNOW'};
  if(code<=84) return {icon:'🌧️',desc:'SHOWERS'};
  if(code<=99) return {icon:'⛈️',desc:'THUNDERSTORM'};
  return {icon:'🌡️',desc:'CONDITIONS UNKNOWN'};
}

// ── CALENDAR (via Cloudflare Worker) ──────────────────────────────────────
async function loadCalendar(){
  const body=document.getElementById('calendar-body');
  body.innerHTML=`<div class="loading-row"><span class="spin">⚙</span> Syncing calendar...</div>`;
  try{
    const today=new Date();
    const todayStr=today.toISOString().split('T')[0];

    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        mcp_servers:[{type:'url',url:'https://gcal.mcp.claude.com/mcp',name:'gcal'}],
        messages:[{
          role:'user',
          content:`List all Google Calendar events for today ${todayStr} in timezone Australia/Melbourne. Return ONLY a JSON array, no other text, no markdown. Each item must have: {summary, time, allDay, type} where type is "show" if the event involves caravan/show/4x4/briefing/deployment, otherwise "personal". For all-day events set allDay to true and time to "ALL DAY". For timed events set allDay to false and time to the formatted time e.g. "9:00 AM". If there are no events return an empty array [].`
        }]
      })
    });

    if(!res.ok){throw new Error('Worker error '+res.status);}

    const data=await res.json();

    // Extract text from response
    const textBlocks=data.content?data.content.filter(c=>c.type==='text').map(c=>c.text).join(''):'';
    const match=textBlocks.match(/\[[\s\S]*?\]/);
    const events=match?JSON.parse(match[0]):[];

    document.getElementById('cal-count').textContent=events.length;

    if(!events.length){
      body.innerHTML=`<div class="empty-state">NO EVENTS TODAY<br>FREE DAY OPERATIVE</div>`;
      return;
    }

    body.innerHTML=events.map(e=>`
      <div class="cal-event ${e.type}-type">
        <div class="cal-event-time">${e.allDay?'ALL DAY':e.time||'TIME TBC'}</div>
        <div class="cal-event-title">${e.summary}</div>
      </div>`).join('');

  }catch(err){
    document.getElementById('calendar-body').innerHTML=`<div style="font-size:10px;color:var(--amber-dim);letter-spacing:1px;">CALENDAR SYNC FAILED<br>${err.message}</div>`;
    document.getElementById('cal-count').textContent='!';
  }
}

// ── TASKS ──────────────────────────────────────────────────────────────────
function renderTasks(){
  const el=document.getElementById('task-list');
  const open=tasks.filter(t=>!t.done).length;
  document.getElementById('task-count').textContent=open;
  if(!tasks.length){el.innerHTML='<div class="empty-state" style="padding:8px;">NO TASKS — SETTLEMENT SECURE</div>';return;}
  const sorted=[...tasks].sort((a,b)=>{
    const p={high:0,med:1,low:2};
    if(a.done!==b.done) return a.done?1:-1;
    return (p[a.pri]||1)-(p[b.pri]||1);
  });
  el.innerHTML=sorted.map(t=>`
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="task-body">
        <div class="task-text ${t.done?'done':''}">${t.text}</div>
        <span class="task-pri tp-${t.pri}">${t.pri.toUpperCase()}</span>
      </div>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    </div>`).join('');
}

function addTask(){
  const text=document.getElementById('new-task').value.trim();
  if(!text)return;
  tasks.push({id:Date.now(),text,pri:document.getElementById('task-pri').value,done:false});
  saveData();renderTasks();
  document.getElementById('new-task').value='';
  showToast('TASK ADDED ✓');
}

function toggleTask(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;saveData();renderTasks();}
}

function deleteTask(id){
  tasks=tasks.filter(x=>x.id!==id);
  saveData();renderTasks();
}

// ── SHOWS ──────────────────────────────────────────────────────────────────
function renderShows(){
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=SHOWS.filter(s=>new Date(s.start)>=today).slice(0,4);
  document.getElementById('shows-count').textContent=upcoming.length;
  const body=document.getElementById('shows-body');
  if(!upcoming.length){body.innerHTML='<div class="empty-state">NO UPCOMING SHOWS</div>';return;}
  body.innerHTML=upcoming.map(s=>{
    const start=new Date(s.start);
    const days=Math.round((start-today)/(1000*60*60*24));
    const label=days===0?'TODAY 🔥':days===1?'TOMORROW':`${days} DAYS`;
    return `<div class="show-item">
      <div class="show-name">${s.name}</div>
      <div class="show-meta">${start.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} · ${s.state}</div>
      <div class="show-countdown">${label}</div>
    </div>`;
  }).join('');
}

function toggleSection(name){
  document.getElementById('section-'+name).classList.toggle('expanded');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
